name: Playwright Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  login-tests:
    uses: ./.github/workflows/run-tests.yml
    with:
      tests-folder: login
    secrets: inherit
  products-catalog-tests:
    uses: ./.github/workflows/run-tests.yml
    with:
      tests-folder: products-catalog
    secrets: inherit
